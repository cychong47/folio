name: Folio

options:
  bundleIdPrefix: com.folio
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # Fill in your Team ID

targets:
  Folio:
    type: application
    platform: macOS
    sources:
      - path: folio
        excludes: []
      - path: Shared
    info:
      path: folio/Info.plist
      properties:
        CFBundleIdentifier: com.folio.app
        CFBundleName: Folio
        CFBundleDisplayName: Folio
        CFBundleShortVersionString: "1.16.3"
        CFBundleVersion: "2"
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        CFBundleURLTypes:
          - CFBundleURLName: com.folio.app
            CFBundleURLSchemes:
              - folio
        NSPhotoLibraryUsageDescription: "Folio reads photo dates to set the correct date on your blog posts."
    entitlements:
      path: folio/Folio.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.folio.app
          - group.com.blogger.app
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.personal-information.photos-library: true
    dependencies:
      - sdk: Photos.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.folio.app
        INFOPLIST_FILE: folio/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: Generate BuildInfo
        script: |
          COMMIT=$(git -C "$SRCROOT" log -1 --format="%h" 2>/dev/null || echo "unknown")
          DATE=$(git -C "$SRCROOT" log -1 --format="%cd" --date=short 2>/dev/null || date +%Y-%m-%d)
          cat > "$SRCROOT/folio/BuildInfo.swift" << EOF
          // Auto-generated by build phase — do not edit manually
          enum BuildInfo {
              static let commitDate = "$DATE"
              static let commitHash = "$COMMIT"
          }
          EOF
        inputFiles:
          - $(SRCROOT)/.git/HEAD
        outputFiles:
          - $(SRCROOT)/folio/BuildInfo.swift

  FolioShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: FolioShareExtension
    info:
      path: FolioShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Folio
        CFBundleShortVersionString: "1.16.3"
        CFBundleVersion: "2"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 50
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: FolioShareExtension/FolioShareExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.folio.app
          - group.com.blogger.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.folio.app.ShareExtension
        INFOPLIST_FILE: FolioShareExtension/Info.plist
    dependencies:
      - sdk: ImageIO.framework

schemes:
  Folio:
    build:
      targets:
        Folio: all
        FolioShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
