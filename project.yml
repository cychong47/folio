name: Blogger

options:
  bundleIdPrefix: com.blogger
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # Fill in your Team ID

targets:
  Blogger:
    type: application
    platform: macOS
    sources:
      - path: blogger
        excludes: []
      - path: Shared
    info:
      path: blogger/Info.plist
      properties:
        CFBundleIdentifier: com.blogger.app
        CFBundleName: Blogger
        CFBundleDisplayName: Blogger
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "2"
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        CFBundleURLTypes:
          - CFBundleURLName: com.blogger.app
            CFBundleURLSchemes:
              - blogger
        NSPhotoLibraryUsageDescription: "Blogger reads photo dates to set the correct date on your blog posts."
    entitlements:
      path: blogger/Blogger.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.application-groups:
          - group.com.blogger.app
        com.apple.security.network.client: true
        com.apple.security.personal-information.photos-library: true
    dependencies:
      - sdk: Photos.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blogger.app
        INFOPLIST_FILE: blogger/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    preBuildScripts:
      - name: Generate BuildInfo
        script: |
          COMMIT=$(git -C "$SRCROOT" log -1 --format="%h" 2>/dev/null || echo "unknown")
          DATE=$(git -C "$SRCROOT" log -1 --format="%cd" --date=short 2>/dev/null || date +%Y-%m-%d)
          cat > "$SRCROOT/blogger/BuildInfo.swift" << EOF
          // Auto-generated by build phase — do not edit manually
          enum BuildInfo {
              static let commitDate = "$DATE"
              static let commitHash = "$COMMIT"
          }
          EOF
        inputFiles:
          - $(SRCROOT)/.git/HEAD
        outputFiles:
          - $(SRCROOT)/blogger/BuildInfo.swift

  BloggerShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: BloggerShareExtension
    info:
      path: BloggerShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Blogger
        CFBundleShortVersionString: "1.4"
        CFBundleVersion: "2"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 50
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
    entitlements:
      path: BloggerShareExtension/BloggerShareExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.blogger.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blogger.app.ShareExtension
        INFOPLIST_FILE: BloggerShareExtension/Info.plist
    dependencies:
      - sdk: ImageIO.framework

schemes:
  Blogger:
    build:
      targets:
        Blogger: all
        BloggerShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
